<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube Secreto 🌸</title>
<link rel="icon" type="image/x-icon" href="img/logo.jpeg">
<link href="img/logo.jpeg" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
background:linear-gradient(135deg,#ffb7e4,#fcf9be,#c0fccf);
height:100vh;
overflow:hidden;
color:#ff5151;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
animation:fade 2s ease;
}

.title{
font-family:'Playfair Display',serif;
font-size:3rem;
letter-spacing:2px;
color:#6b7a6f;
}

.subtitle{margin-top:10px;font-size:1.1rem;opacity:0.8;}

.btn{
margin-top:35px;
padding:12px 28px;
border-radius:30px;
border:1px solid rgba(0,0,0,0.1);
background:rgba(255,255,255,0.6);
backdrop-filter:blur(8px);
color:#6b7a6f;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.btn:hover{transform:translateY(-2px);} 

.gallery{
position:absolute;
top:0;left:0;width:100%;height:100%;
background:linear-gradient(135deg,#f7e8e8,#f2efe9,#e8f0ea);
opacity:0;pointer-events:none;transition:0.8s;
padding:40px;overflow:auto;
}

.gallery.active{opacity:1;pointer-events:auto;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;margin-top:30px;
}

.card{
border-radius:18px;overflow:hidden;position:relative;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{transform:scale(1.04);} 

.card img{width:100%;height:200px;object-fit:cover;}

.name{
position:absolute;bottom:0;width:100%;
padding:10px;background:rgba(0,0,0,0.4);
color:white;font-size:14px;text-align:center;
}

/* VIBES */
.veigh{background:#111;color:#fff;}
.negao{background:#1a1a1a;color:#f5c542;}
.chanper{background:linear-gradient(135deg,#ff9966,#ff5e62);}
.taylor{background:linear-gradient(135deg,#ffd6e0,#fff);}
.mpb{background:linear-gradient(135deg,#6df58f,#d4e4d7);}
.justin{background:linear-gradient(135deg,#e8f0ea,#d4e4d7);}
.biblia{background:linear-gradient(135deg,#ffd6ec,#fff0f8);}

/* FLORES */
.flower{position:absolute;font-size:30px;opacity:10;animation:float linear infinite;}

@keyframes float{
from{transform:translateY(100vh) rotate(0deg);} 
to{transform:translateY(-10vh) rotate(360deg);} }

@keyframes fade{
from{opacity:0;transform:translateY(20px);} 
to{opacity:1;transform:translateY(0);} }

</style>
</head>

<body>

<div class="container">
<h1 class="title">Clube Secreto 🌸</h1>
<!-- <p class="subtitle">Cada uma com sua vibe, mas juntas sempre 💖</p> -->
<button class="btn" onclick="mostrarGaleria()">Entrar</button>
</div>

<div class="gallery" id="galeria">
<h2 style="text-align:center;color:#ca8911;">Nosso Grupo ✨</h2>

<div class="cards">

<div class="card veigh">
<img src="img/gih.jpeg">
<div class="name">gigih</div>
</div>

<div class="card negao">
<img src="img/lele.jpeg">
<div class="name">leleh</div>
</div>

<div class="card chanper">
<img src="img/juju.jpeg">
<div class="name">juju</div>
</div>

<div class="card taylor">
<img src="img/weme.jpeg">
<div class="name">weme</div>
</div>

<div class="card mpb">
<img src="img/guedes.jpeg">
<div class="name">Rafa</div>
</div>

<div class="card justin">
<img src="img/rafa.jpeg">
<div class="name">Guedes</div>
</div>

<div class="card biblia">
<img src="img/ket.jpeg">
<div class="name">keket</div>
</div>

</div>
</div>

<script>

function mostrarGaleria(){
document.getElementById("galeria").classList.add("active")
}

function criarFlores(){
const flores=["🌸","🌼","🌷","🌺","🌻"]
for(let i=0;i<25;i++){
let flower=document.createElement("div")
flower.classList.add("flower")
flower.innerHTML=flores[Math.floor(Math.random()*flores.length)]
flower.style.left=Math.random()*100+"vw"
flower.style.animationDuration=(Math.random()*8+6)+"s"
flower.style.fontSize=(Math.random()*15+12)+"px"
document.body.appendChild(flower)
}}

criarFlores()

</script>

</body>
</html>
